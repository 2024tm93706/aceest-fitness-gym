apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
      version: green
  template:
    metadata:
      labels:
        app: aceest
        version: green
    spec:
      containers:
        - name: aceest
          image: asia-south1-docker.pkg.dev/even-ruler-494913-g4/aceest-repo/app:v3
          ports:
            - containerPort: 5000