apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
    spec:
      containers:
      - name: aceest-container
        image: 2024tm93706/aceest-fitness-gym:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000