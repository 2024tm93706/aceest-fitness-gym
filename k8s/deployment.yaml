apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
    spec:
      containers:
        - name: aceest
          image: asia-south1-docker.pkg.dev/even-ruler-494913-g4/aceest-repo/app:v1
          ports:
            - containerPort: 5000

